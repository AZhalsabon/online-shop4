services:
  web:
    image: nginx
    ports:
      - 85:80
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html

  php-fpm:
    build: docker/php
    volumes:
      - .:/var/www/html

  postgres_db:
    image: postgres:13
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data

    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 54324:5432

